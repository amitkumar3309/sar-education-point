<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduCoach Pro — Coaching Portal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c1:#0d0f1c;--c2:#12152b;--c3:#181b35;--acc:#6c63ff;--acc2:#f5a623;
  --green:#22c55e;--blue:#38bdf8;--red:#f43f5e;--purple:#a78bfa;--orange:#fb923c;
  --txt:#e8e9f3;--txt2:#7e8299;--card:#161929;--border:#252848;--inp:#1c1f3a;
  --radius:10px;--font:'Inter',sans-serif
}
body{font-family:var(--font);background:var(--c1);color:var(--txt);min-height:100vh;font-size:13px}
.app{display:flex;min-height:100vh}
/* ── SIDEBAR ── */
.sidebar{width:215px;background:var(--c2);border-right:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:10}
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.logo .brand{font-size:16px;font-weight:600;color:#fff}
.logo .sub{font-size:10px;color:var(--txt2);margin-top:2px;letter-spacing:.5px}
.nav-sec{font-size:9px;color:var(--txt2);padding:12px 18px 4px;text-transform:uppercase;letter-spacing:1.2px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 18px;cursor:pointer;font-size:12px;color:var(--txt2);transition:all .18s;border-left:2px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.03);color:var(--txt)}
.nav-item.active{background:rgba(108,99,255,.13);color:var(--acc);border-left-color:var(--acc)}
.nav-ico{width:15px;height:15px;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:14px 18px;border-top:1px solid var(--border)}
/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;margin-left:215px}
.topbar{background:var(--c2);border-bottom:1px solid var(--border);padding:12px 22px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:5}
.topbar h1{font-size:14px;font-weight:500;color:#fff}
.topbar-right{display:flex;align-items:center;gap:8px}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff}
.content{flex:1;padding:20px 22px;overflow-y:auto}
.page{display:none}
.page.active{display:block}
/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
@media(max-width:700px){.stats-row{grid-template-columns:1fr 1fr}}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat .lbl{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.stat .val{font-size:24px;font-weight:600;color:#fff;line-height:1}
.stat .hint{font-size:10px;margin-top:4px;color:var(--txt2)}
/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.card-ttl{font-size:13px;font-weight:500;color:#fff}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.g2{grid-template-columns:1fr}}
/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:400px}
th{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:.7px;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
/* ── PILLS ── */
.pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap}
.p-green{background:rgba(34,197,94,.15);color:#22c55e}
.p-red{background:rgba(244,63,94,.15);color:#f43f5e}
.p-amber{background:rgba(245,166,35,.15);color:#f5a623}
.p-blue{background:rgba(56,189,248,.15);color:#38bdf8}
.p-purple{background:rgba(167,139,250,.15);color:#a78bfa}
.p-gray{background:rgba(126,130,153,.15);color:#7e8299}
/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .18s;font-family:var(--font)}
.btn-acc{background:var(--acc);color:#fff}
.btn-acc:hover{background:#5a52e0}
.btn-sec{background:var(--inp);color:var(--txt);border:1px solid var(--border)}
.btn-sec:hover{background:var(--border)}
.btn-green{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.25)}
.btn-green:hover{background:rgba(34,197,94,.25)}
.btn-red{background:rgba(244,63,94,.12);color:#f43f5e;border:1px solid rgba(244,63,94,.2)}
.btn-red:hover{background:rgba(244,63,94,.22)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-wa{background:#25d366;color:#fff}
.btn-wa:hover{background:#1eba56}
.btn-export{background:rgba(56,189,248,.12);color:#38bdf8;border:1px solid rgba(56,189,248,.2)}
.btn-export:hover{background:rgba(56,189,248,.22)}
/* ── FORMS ── */
.fl{display:flex;align-items:center;gap:8px}
.fl-wrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.lbl{font-size:11px;color:var(--txt2);font-weight:500}
input[type=text],input[type=number],input[type=password],input[type=email],select,textarea{width:100%;background:var(--inp);border:1px solid var(--border);border-radius:7px;padding:8px 11px;color:var(--txt);font-size:12px;font-family:var(--font);outline:none;transition:border-color .18s}
input:focus,select:focus,textarea:focus{border-color:var(--acc)}
select option{background:var(--c2)}
/* ── TABS ── */
.tab-row{display:flex;gap:3px;margin-bottom:14px;background:var(--inp);border-radius:7px;padding:3px;flex-wrap:wrap}
.tab{padding:5px 14px;border-radius:5px;font-size:12px;cursor:pointer;color:var(--txt2);transition:all .18s;white-space:nowrap}
.tab.active{background:var(--card);color:#fff}
/* ── UPLOAD ── */
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:26px;text-align:center;cursor:pointer;position:relative;transition:border-color .2s}
.upload-zone:hover{border-color:var(--acc)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
/* ── NOTIFICATION ── */
.notif{position:fixed;bottom:20px;right:20px;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:500;transform:translateY(60px);opacity:0;transition:all .3s;z-index:9999;max-width:300px;line-height:1.4}
.notif.show{transform:translateY(0);opacity:1}
/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:var(--c2);border:1px solid var(--border);border-radius:14px;padding:24px;width:480px;max-width:100%;max-height:90vh;overflow-y:auto}
.modal-ttl{font-size:15px;font-weight:600;margin-bottom:16px;color:#fff}
/* ── HW STATUS ── */
.hw-status-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid;transition:all .15s;white-space:nowrap}
.hws-checked{background:rgba(34,197,94,.12);color:#22c55e;border-color:rgba(34,197,94,.3)}
.hws-unchecked{background:rgba(56,189,248,.12);color:#38bdf8;border-color:rgba(56,189,248,.3)}
.hws-incomplete{background:rgba(244,63,94,.12);color:#f43f5e;border-color:rgba(244,63,94,.3)}
.hws-pending{background:rgba(126,130,153,.1);color:var(--txt2);border-color:var(--border)}
.hw-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
/* ── PROGRESS ── */
.progress{background:rgba(255,255,255,.07);border-radius:20px;height:5px;overflow:hidden;margin:6px 0}
.prog-fill{height:100%;border-radius:20px;transition:width .3s}
/* ── FILE ITEM ── */
.file-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--inp);border-radius:8px;border:1px solid var(--border);margin-bottom:8px}
.file-ico{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
/* ── BATCH CHIP ── */
.batch-chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:11px;background:rgba(108,99,255,.12);color:var(--acc);border:1px solid rgba(108,99,255,.2)}
/* ── WA PREVIEW ── */
.wa-preview{background:rgba(37,211,102,.07);border:1px solid rgba(37,211,102,.2);border-radius:8px;padding:12px;font-size:12px;color:var(--txt);margin-top:10px;border-left:3px solid #25d366;line-height:1.5}
/* ── LOGIN ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--c1);padding:16px}
.login-card{background:var(--c2);border:1px solid var(--border);border-radius:16px;padding:32px;width:360px;max-width:100%}
.login-logo{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--txt2);margin-bottom:22px}
.role-tabs{display:flex;gap:6px;margin-bottom:20px}
.role-tab{flex:1;padding:8px;border-radius:8px;text-align:center;font-size:12px;cursor:pointer;border:1px solid var(--border);color:var(--txt2);transition:all .2s}
.role-tab.active{background:var(--acc);color:#fff;border-color:var(--acc)}
/* ── STUDENT PORTAL ── */
.sp-header{background:var(--c2);border-bottom:1px solid var(--border);padding:13px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5}
.sp-content{padding:20px;max-width:820px;margin:0 auto}
/* ── SEP ── */
.sep{height:1px;background:var(--border);margin:12px 0}
.export-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.empty-msg{text-align:center;color:var(--txt2);padding:20px;font-size:12px}
</style>
</head>
<body>

<div id="root"></div>
<div class="notif" id="notif"></div>

<!-- ADD STUDENT MODAL -->
<div class="modal-bg" id="modal-add-student">
  <div class="modal">
    <div class="modal-ttl">Add New Student</div>
    <div class="g2">
      <div class="fg"><div class="lbl">Full Name *</div><input type="text" id="s-name"></div>
      <div class="fg"><div class="lbl">Roll No. *</div><input type="text" id="s-roll"></div>
      <div class="fg"><div class="lbl">Batch / Class *</div><select id="s-batch"></select></div>
      <div class="fg"><div class="lbl">Subject Group</div>
        <select id="s-subj"><option>Science Stream</option><option>Commerce</option><option>Arts</option><option>Mathematics</option><option>All Subjects</option></select></div>
      <div class="fg"><div class="lbl">Parent Phone (WhatsApp)</div><input type="text" id="s-phone" placeholder="+91..."></div>
      <div class="fg"><div class="lbl">Login Password</div><input type="password" id="s-pass" placeholder="Auto: roll+123"></div>
    </div>
    <div class="fl" style="margin-top:6px;gap:8px">
      <button class="btn btn-acc" onclick="addStudent()" style="flex:1">Add Student</button>
      <button class="btn btn-sec" onclick="closeModal('modal-add-student')" style="flex:1">Cancel</button>
    </div>
  </div>
</div>

<!-- WA MODAL -->
<div class="modal-bg" id="modal-wa">
  <div class="modal">
    <div class="modal-ttl">Send WhatsApp / SMS Alert</div>
    <div class="fg"><div class="lbl">Send To</div>
      <select id="wa-to">
        <option value="all">All Parents</option>
        <option value="absent">Absent Students' Parents</option>
        <option value="low">Low Attendance (&lt;75%)</option>
        <option value="hw">Homework Pending</option>
      </select>
    </div>
    <div class="fg"><div class="lbl">Template</div>
      <select id="wa-tpl" onchange="updateWAMsg()">
        <option value="att">Attendance Alert</option>
        <option value="hw">Homework Reminder</option>
        <option value="marks">Marks Update</option>
        <option value="fee">Fee Reminder</option>
        <option value="custom">Custom Message</option>
      </select>
    </div>
    <div class="fg" id="wa-custom-wrap" style="display:none"><div class="lbl">Your Message</div><textarea id="wa-custom-msg" rows="3" oninput="updateWAMsg()"></textarea></div>
    <div class="wa-preview" id="wa-msg-preview"></div>
    <div class="fl" style="margin-top:14px;gap:8px">
      <button class="btn btn-wa" onclick="doSendWA()" style="flex:1">Send via WhatsApp</button>
      <button class="btn btn-sec" onclick="doSendSMS()" style="flex:1">Send SMS</button>
      <button class="btn btn-sec btn-sm" onclick="closeModal('modal-wa')">Cancel</button>
    </div>
    <div style="margin-top:10px;font-size:11px;color:var(--txt2)">⚠ Requires WhatsApp Business API / Twilio for real sending.</div>
  </div>
</div>

<!-- BATCH MODAL -->
<div class="modal-bg" id="modal-batch">
  <div class="modal">
    <div class="modal-ttl">Manage Batches</div>
    <div class="fg fl" style="flex-direction:row;gap:8px">
      <input type="text" id="new-batch-inp" placeholder="e.g. Class 10A, JEE Batch..." style="flex:1">
      <button class="btn btn-acc btn-sm" onclick="addBatch()">Add</button>
    </div>
    <div class="sep"></div>
    <div id="batch-modal-list"></div>
    <button class="btn btn-sec" onclick="closeModal('modal-batch')" style="margin-top:14px;width:100%">Done</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// DATA LAYER — localStorage persistence
// ═══════════════════════════════════════════
function save(key,val){try{localStorage.setItem('ec_'+key,JSON.stringify(val));}catch(e){}}
function load(key,def){try{const v=localStorage.getItem('ec_'+key);return v?JSON.parse(v):def;}catch(e){return def;}}

let batches=load('batches',['Class 9A','Class 10A','Class 10B','JEE Batch']);
let students=load('students',[
  {id:1,name:'Arjun Sharma',roll:'001',batch:'Class 10A',subj:'Science Stream',phone:'9876543210',pass:'arjun123'},
  {id:2,name:'Priya Patel',roll:'002',batch:'Class 10A',subj:'Science Stream',phone:'9876543211',pass:'priya123'},
  {id:3,name:'Rahul Singh',roll:'003',batch:'Class 10B',subj:'Commerce',phone:'9876543212',pass:'rahul123'},
  {id:4,name:'Sneha Gupta',roll:'004',batch:'JEE Batch',subj:'Science Stream',phone:'9876543213',pass:'sneha123'},
  {id:5,name:'Karan Mehta',roll:'005',batch:'Class 9A',subj:'Mathematics',phone:'9876543214',pass:'karan123'},
]);
let marksData=load('marks',[]);
let attData=load('att',[]);
let hwData=load('hw',[]);
let worksheets=load('ws',[]);

function persist(){save('batches',batches);save('students',students);save('marks',marksData);save('att',attData);save('hw',hwData);save('ws',worksheets);}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
let currentUser={role:'login'};

const waMsgs={
  att:'Dear Parent, your child was marked ABSENT today at EduCoach. Kindly ensure regular attendance. Thank you.',
  hw:'Dear Parent, your child has PENDING homework due. Please ensure it is completed on time. — EduCoach',
  marks:'Dear Parent, test results are now available. Please login to the student portal to check. — EduCoach',
  fee:'Dear Parent, coaching fees for this month are due. Kindly contact us for payment. — EduCoach',
  custom:''
};
const hwStatusLabel={checked:'✓ Checked',unchecked:'⊘ Not Checked',incomplete:'✗ Not Completed',pending:'— Pending'};
const hwStatusClass={checked:'hws-checked',unchecked:'hws-unchecked',incomplete:'hws-incomplete',pending:'hws-pending'};
const hwStatusNext={pending:'checked',checked:'unchecked',unchecked:'incomplete',incomplete:'pending'};
const hwDotColor={checked:'#22c55e',unchecked:'#38bdf8',incomplete:'#f43f5e',pending:'#7e8299'};

function getGrade(pct){
  if(pct>=90)return{g:'A+',c:'#22c55e'};if(pct>=80)return{g:'A',c:'#22c55e'};
  if(pct>=70)return{g:'B',c:'#38bdf8'};if(pct>=60)return{g:'C',c:'#f5a623'};
  if(pct>=50)return{g:'D',c:'#fb923c'};return{g:'F',c:'#f43f5e'};
}
function getSAtt(id){const r=attData.filter(a=>a.sid===id);if(!r.length)return 0;return Math.round(r.filter(a=>a.status==='P').length/r.length*100);}
function getSAvg(id){const r=marksData.filter(m=>m.sid===id);if(!r.length)return 0;return Math.round(r.reduce((s,m)=>s+(m.marks/m.total*100),0)/r.length);}
function today(){return new Date().toLocaleDateString('en-IN');}

function notif(msg,col='#22c55e'){
  const n=document.getElementById('notif');
  n.textContent=msg;n.style.background=col;n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'),3200);
}
function openModal(id){document.getElementById(id)?.classList.add('open');}
function closeModal(id){document.getElementById(id)?.classList.remove('open');}

// ═══════════════════════════════════════════
// RENDER ROOT
// ═══════════════════════════════════════════
function renderApp(){
  if(currentUser.role==='login'){renderLogin();return;}
  if(currentUser.role==='student'){renderStudentPortal();return;}
  renderAdmin();
}

// ═══════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════
let loginRole='admin';
function renderLogin(){
  document.getElementById('root').innerHTML=`
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">🎓 EduCoach Pro</div>
      <div class="login-sub">Coaching Management Portal</div>
      <div class="role-tabs">
        <div class="role-tab active" id="rt-admin" onclick="setLoginRole('admin')">Admin / Teacher</div>
        <div class="role-tab" id="rt-student" onclick="setLoginRole('student')">Student Login</div>
      </div>
      <div id="login-form"></div>
    </div>
  </div>`;
  setLoginRole('admin');
}

function setLoginRole(r){
  loginRole=r;
  document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('rt-'+r)?.classList.add('active');
  const f=document.getElementById('login-form');
  if(r==='admin'){
    f.innerHTML=`
      <div class="fg"><div class="lbl">Username</div><input type="text" id="l-user" value="admin" autocomplete="off"></div>
      <div class="fg"><div class="lbl">Password</div><input type="password" id="l-pass" value="admin123"></div>
      <button class="btn btn-acc" onclick="doLoginAdmin()" style="width:100%;justify-content:center;margin-top:4px">Login as Teacher</button>
      <div style="margin-top:12px;font-size:11px;color:var(--txt2);text-align:center">Default: admin / admin123</div>`;
  } else {
    f.innerHTML=`
      <div class="fg"><div class="lbl">Roll Number</div><input type="text" id="l-roll" autocomplete="off"></div>
      <div class="fg"><div class="lbl">Password</div><input type="password" id="l-spass"></div>
      <button class="btn btn-acc" onclick="doLoginStudent()" style="width:100%;justify-content:center;margin-top:4px">Login as Student</button>
      <div style="margin-top:12px;font-size:11px;color:var(--txt2);text-align:center">Demo: roll 001, pass arjun123</div>`;
  }
}

function doLoginAdmin(){
  const u=document.getElementById('l-user')?.value.trim();
  const p=document.getElementById('l-pass')?.value.trim();
  if(u==='admin'&&p==='admin123'){currentUser={role:'admin'};renderApp();}
  else notif('Wrong credentials','#f43f5e');
}
function doLoginStudent(){
  const roll=document.getElementById('l-roll')?.value.trim();
  const pass=document.getElementById('l-spass')?.value.trim();
  const s=students.find(st=>st.roll===roll&&st.pass===pass);
  if(s){currentUser={role:'student',student:s};renderApp();}
  else notif('Wrong roll number or password','#f43f5e');
}

// ═══════════════════════════════════════════
// STUDENT PORTAL
// ═══════════════════════════════════════════
function renderStudentPortal(){
  const s=currentUser.student;
  const myMarks=marksData.filter(m=>m.sid===s.id);
  const myAtt=attData.filter(a=>a.sid===s.id);
  const myWS=worksheets.filter(w=>w.batch===s.batch||w.batch==='All Batches');
  const myHW=hwData.filter(h=>h.batch===s.batch);
  const attPct=myAtt.length?Math.round(myAtt.filter(a=>a.status==='P').length/myAtt.length*100):0;
  const avgPct=myMarks.length?Math.round(myMarks.reduce((acc,m)=>acc+(m.marks/m.total*100),0)/myMarks.length):0;

  document.getElementById('root').innerHTML=`
  <div style="min-height:100vh;background:var(--c1)">
    <div class="sp-header">
      <div class="fl">
        <div class="avatar">${s.name[0].toUpperCase()}</div>
        <div>
          <div style="font-weight:600;font-size:14px;color:#fff">${s.name}</div>
          <div style="font-size:11px;color:var(--txt2)">${s.batch} · Roll No. ${s.roll}</div>
        </div>
      </div>
      <button class="btn btn-sec btn-sm" onclick="currentUser={role:'login'};renderApp()">Logout</button>
    </div>
    <div class="sp-content">

function renderStudentsTable(){
  const q=(document.getElementById('s-search')?.value||'').toLowerCase();
  const fb=document.getElementById('s-filter-batch')?.value||'';
  const list=students.filter(s=>(s.name.toLowerCase().includes(q)||s.roll.includes(q))&&(!fb||s.batch===fb));
  const tb=document.getElementById('students-tbody');if(!tb)return;
  tb.innerHTML=list.map((s,i)=>{
    const att=getSAtt(s.id),avg=getSAvg(s.id);
    return`<tr>
      <td style="color:var(--txt2)">${i+1}</td>
      <td style="font-weight:500">${s.name}</td>
      <td style="font-size:11px;color:var(--txt2)">${s.roll}</td>
      <td><span class="batch-chip">${s.batch}</span></td>
      <td><span class="pill ${att>=75?'p-green':att>=60?'p-amber':'p-red'}">${att||0}%</span></td>
      <td>${avg?avg+'%':'—'}</td>
      <td style="font-size:11px;color:var(--txt2)">${s.phone||'—'}</td>
      <td><button class="btn btn-red btn-sm" onclick="delStudent(${s.id})">Remove</button></td>
    </tr>`;
  }).join('')||`<tr><td colspan="8" class="empty-msg">No students found</td></tr>`;
}

function openAddStudentModal(){
  const sel=document.getElementById('s-batch');
  if(sel)sel.innerHTML=batches.map(b=>`<option>${b}</option>`).join('');
  openModal('modal-add-student');
}

function addStudent(){
  const name=document.getElementById('s-name')?.value.trim();
  const roll=document.getElementById('s-roll')?.value.trim();
  if(!name||!roll){notif('Name and Roll No. required','#f43f5e');return;}
  if(students.find(s=>s.roll===roll)){notif('Roll number already exists','#f43f5e');return;}
  const newS={id:Date.now(),name,roll,
    batch:document.getElementById('s-batch')?.value||batches[0],
    subj:document.getElementById('s-subj')?.value||'All Subjects',
    phone:document.getElementById('s-phone')?.value||'',
    pass:document.getElementById('s-pass')?.value||roll+'123'};
  students.push(newS);persist();
  closeModal('modal-add-student');notif('Student added ✓');
  ['s-name','s-roll','s-phone','s-pass'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  if(activePage==='students')renderStudentsTable();
  if(activePage==='dashboard')renderDash();
}

function delStudent(id){
  if(!confirm('Remove this student?'))return;
  students=students.filter(s=>s.id!==id);persist();
  renderStudentsTable();notif('Student removed','#f43f5e');
}

function addBatch2(){
  const n=document.getElementById('nb-name')?.value.trim();

function deleteBatch(b){

  batches=batches.filter(x=>x!==b);persist();

  const batch=document.getElementById('m-batch')?.value||batches[0];

  tb.innerHTML=list.map(s=>`<tr>

  </tr>`).join('')||`<tr><td colspan="3" class="empty-msg">No students in this batch</td></tr>`;

function updateGradeCell(id){
  const v=parseFloat(document.getElementById('mi-'+id)?.value);
  const tot=parseFloat(document.getElementById('m-total')?.value)||100;
  if(isNaN(v)){const el=document.getElementById('mg-'+id);if(el){el.textContent='—';el.style.color='var(--txt2)';}return;}
  const{g,c}=getGrade(v/tot*100);
  const el=document.getElementById('mg-'+id);if(el){el.textContent=g;el.style.color=c;}
}

function saveMarks(){
  const exam=document.getElementById('exam-name')?.value.trim();
  const subj=document.getElementById('m-subj')?.value;
  const total=parseFloat(document.getElementById('m-total')?.value)||100;
  const date=document.getElementById('m-date')?.value||today();
  const batch=document.getElementById('m-batch')?.value||batches[0];
  if(!exam){notif('Enter exam name','#f43f5e');return;}
  let cnt=0;
  students.filter(s=>s.batch===batch).forEach(s=>{
    const v=document.getElementById('mi-'+s.id)?.value;
    if(v!==''&&v!==undefined&&v!==null&&v.length>0){
      marksData.push({sid:s.id,sname:s.name,batch,exam,subj,marks:parseFloat(v),total,date});cnt++;

  });
  persist();
  notif(cnt?`✓ Saved for ${cnt} students`:'No scores entered — fill marks first',cnt?'#22c55e':'#f43f5e');

function switchTab(scope,tab,el){
  if(scope==='marks'){
    document.querySelectorAll('#page-marks .tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
    document.getElementById('marks-enter').style.display=tab==='enter'?'block':'none';
    document.getElementById('marks-view').style.display=tab==='view'?'block':'none';
    if(tab==='view')renderMarksView();
  }
  if(scope==='att'){
    document.querySelectorAll('#page-attendance .tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
    document.getElementById('att-mark').style.display=tab==='mark'?'block':'none';
    document.getElementById('att-report').style.display=tab==='report'?'block':'none';
    if(tab==='report')renderAttReport();
  }
  if(scope==='hw'){
    document.querySelectorAll('#page-homework .tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
    document.getElementById('hw-assign').style.display=tab==='assign'?'block':'none';
    document.getElementById('hw-track').style.display=tab==='track'?'block':'none';
    if(tab==='track')renderHWList();
  }
}

function renderMarksView(){
  const sel=document.getElementById('mv-exam');
  if(sel){const exams=[...new Set(marksData.map(m=>m.exam))];const cur=sel.value;sel.innerHTML='<option value="">All Exams</option>'+exams.map(e=>`<option ${e===cur?'selected':''}>${e}</option>`).join('');}
  const fe=document.getElementById('mv-exam')?.value||'';
  const fb=document.getElementById('mv-batch')?.value||'';
  const list=marksData.filter(m=>(!fe||m.exam===fe)&&(!fb||m.batch===fb));

  tb.innerHTML=list.map(m=>{

}

function renderAttTable(){
  const batch=document.getElementById('att-batch')?.value||batches[0];
  const list=students.filter(s=>s.batch===batch);
  const tb=document.getElementById('att-tbody');if(!tb)return;
  attSessionStatus={};
  tb.innerHTML=list.map((s,i)=>{
    attSessionStatus[s.id]='';
    return`<tr>
      <td style="color:var(--txt2)">${i+1}</td>
      <td style="font-weight:500">${s.name}</td>
      <td id="as-${s.id}"><span class="pill p-gray">—</span></td>

      </td>
    </tr>`;
  }).join('')||`<tr><td colspan="4" class="empty-msg">No students in this batch</td></tr>`;

function setAtt(id,status){
  attSessionStatus[id]=status;
  const el=document.getElementById('as-'+id);
  if(el)el.innerHTML=status==='P'?'<span class="pill p-green">Present</span>':'<span class="pill p-red">Absent</span>';
}

function markAll(status){
  const batch=document.getElementById('att-batch')?.value||batches[0];
  students.filter(s=>s.batch===batch).forEach(s=>setAtt(s.id,status));
}

function saveAtt(){
  const date=document.getElementById('att-date')?.value||today();
  const subj=document.getElementById('att-subj')?.value;
  const batch=document.getElementById('att-batch')?.value||batches[0];
  const list=students.filter(s=>s.batch===batch);
  let cnt=0;
  list.forEach(s=>{
    const status=attSessionStatus[s.id];
    if(!status)return;
    attData=attData.filter(a=>!(a.sid===s.id&&a.date===date&&a.subj===subj));
    attData.push({sid:s.id,sname:s.name,batch,date,subj,status});cnt++;
  });
  persist();notif(cnt?`✓ Attendance saved for ${cnt} students`:'No attendance marked — tap P or A first',cnt?'#22c55e':'#f43f5e');
}

function renderAttReport(){
  const fb=document.getElementById('ar-batch')?.value||'';
  const list=students.filter(s=>!fb||s.batch===fb);
  const tb=document.getElementById('att-report-body');if(!tb)return;
  tb.innerHTML=list.map(s=>{
    const r=attData.filter(a=>a.sid===s.id);
    const tot=r.length,pres=r.filter(a=>a.status==='P').length,abs=tot-pres;
    const pct=tot?Math.round(pres/tot*100):0;
    const{lbl,cls}=pct>=75?{lbl:'Regular',cls:'p-green'}:pct>=60?{lbl:'At Risk',cls:'p-amber'}:{lbl:'Low',cls:'p-red'};
    return`<tr><td style="font-weight:500">${s.name}</td><td><span class="batch-chip" style="font-size:10px">${s.batch}</span></td><td>${tot}</td><td style="color:#22c55e">${pres}</td><td style="color:#f43f5e">${abs}</td><td>${pct}%</td><td><span class="pill ${cls}">${lbl}</span></td></tr>`;
  }).join('');
}

function createHW(){
  const title=document.getElementById('hw-title')?.value.trim();
  if(!title){notif('Enter homework title','#f43f5e');return;}
  const batch=document.getElementById('hw-batch')?.value||batches[0];
  const hw={id:Date.now(),title,subj:document.getElementById('hw-subj')?.value,batch,due:document.getElementById('hw-due')?.value||'—',notes:document.getElementById('hw-notes')?.value||'',completions:{},hwStatus:{}};
  students.filter(s=>s.batch===batch).forEach(s=>{hw.completions[s.id]='pending';hw.hwStatus[s.id]='pending';});
  hwData.push(hw);persist();
  notif('✓ Homework assigned');
  ['hw-title','hw-due','hw-notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
}

function renderHWList(){
  const list=document.getElementById('hw-list');if(!list)return;
  if(!hwData.length){list.innerHTML='<div class="card"><div class="empty-msg">No homework assigned yet</div></div>';return;}
  list.innerHTML=hwData.slice().reverse().map(hw=>{
    const bStu=students.filter(s=>s.batch===hw.batch);
    const done=bStu.filter(s=>hw.completions?.[s.id]==='done').length;
    const total=bStu.length;
    const pct=total?Math.round(done/total*100):0;
    const checked=bStu.filter(s=>hw.hwStatus?.[s.id]==='checked').length;
    const incomplete=bStu.filter(s=>hw.hwStatus?.[s.id]==='incomplete').length;
    return`<div class="card" style="margin-bottom:12px">
      <div class="card-hd">
        <div>
          <div style="font-weight:500;font-size:13px">${hw.title}</div>
          <div style="font-size:11px;color:var(--txt2);margin-top:2px">${hw.subj} · ${hw.batch} · Due: ${hw.due}</div>
        </div>
        <div class="fl" style="flex-wrap:wrap;gap:4px">
          <span class="pill ${pct===100?'p-green':pct>50?'p-amber':'p-red'}">${done}/${total} submitted</span>
          <span class="pill p-blue">${checked} checked</span>
          ${incomplete?`<span class="pill p-red">${incomplete} incomplete</span>`:''}
        </div>
      </div>
      <div class="progress"><div class="prog-fill" style="width:${pct}%;background:${pct===100?'#22c55e':pct>50?'#f5a623':'#f43f5e'}"></div></div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Student</th><th>Submitted</th><th>Homework Check Status</th></tr></thead>
        <tbody>
          ${bStu.map(s=>{
            const comp=hw.completions?.[s.id]||'pending';
            const chk=hw.hwStatus?.[s.id]||'pending';
            return`<tr>
              <td style="font-weight:500">${s.name}</td>
              <td><span class="pill ${comp==='done'?'p-green':'p-amber'}" style="cursor:pointer" title="Click to toggle" onclick="toggleSubmit(${hw.id},${s.id})">${comp==='done'?'✓ Done':'⏳ Pending'}</span></td>
              <td>
                <button class="hw-status-btn ${hwStatusClass[chk]}" onclick="cycleHWStatus(${hw.id},${s.id})" title="Click to change status">
                  <span class="hw-dot" style="background:${hwDotColor[chk]}"></span>
                  ${hwStatusLabel[chk]}
                </button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table></div>
    </div>`;
  }).join('');
}

function toggleSubmit(hwId,sId){
  const hw=hwData.find(h=>h.id===hwId);
  if(hw){hw.completions[sId]=hw.completions[sId]==='done'?'pending':'done';persist();renderHWList();}
}

function cycleHWStatus(hwId,sId){
  const hw=hwData.find(h=>h.id===hwId);
  if(hw){
    const cur=hw.hwStatus?.[sId]||'pending';
    hw.hwStatus[sId]=hwStatusNext[cur];
    persist();renderHWList();
  }
}

        <div class="card-ttl" style="margin-bottom:12px">📊 Attendance Report</div>
        <div class="fg"><div class="lbl">Batch</div><select id="exp-att-batch"><option value="">All Batches</option>${batches.map(b=>`<option>${b}</option>`).join('')}</select></div>
        <div class="export-row">
          <button class="btn btn-export" onclick="exportCSV('att')">↓ Export CSV</button>
          <button class="btn btn-sec" onclick="printReport('att')">🖨 Print / PDF</button>
        </div>
      </div>
      <div class="card">
        <div class="card-ttl" style="margin-bottom:12px">📝 Marks Report</div>
        <div class="fg"><div class="lbl">Exam</div><select id="exp-marks-exam"><option value="">All Exams</option>${[...new Set(marksData.map(m=>m.exam))].map(e=>`<option>${e}</option>`).join('')}</select></div>
        <div class="fg"><div class="lbl">Batch</div><select id="exp-marks-batch"><option value="">All Batches</option>${batches.map(b=>`<option>${b}</option>`).join('')}</select></div>
        <div class="export-row">
          <button class="btn btn-export" onclick="exportCSV('marks')">↓ Export CSV</button>
          <button class="btn btn-sec" onclick="printReport('marks')">🖨 Print / PDF</button>
        </div>
      </div>
      <div class="card">
        <div class="card-ttl" style="margin-bottom:12px">📋 Homework Report</div>
        <div class="fg"><div class="lbl">Batch</div><select id="exp-hw-batch"><option value="">All Batches</option>${batches.map(b=>`<option>${b}</option>`).join('')}</select></div>
        <div class="export-row">
          <button class="btn btn-export" onclick="exportCSV('hw')">↓ Export CSV</button>
          <button class="btn btn-sec" onclick="printReport('hw')">🖨 Print / PDF</button>
        </div>
      </div>
      <div class="card">
        <div class="card-ttl" style="margin-bottom:12px">👥 Student List</div>
        <div class="fg"><div class="lbl">Batch</div><select id="exp-stu-batch"><option value="">All Batches</option>${batches.map(b=>`<option>${b}</option>`).join('')}</select></div>
        <div class="export-row">
          <button class="btn btn-export" onclick="exportCSV('students')">↓ Export CSV</button>
          <button class="btn btn-sec" onclick="printReport('students')">🖨 Print / PDF</button>
        </div>
      </div>
    </div>`;
}

function exportCSV(type){
  let rows=[],headers=[];
  const fb=(document.getElementById('exp-'+type+'-batch')||document.getElementById('exp-att-batch'))?.value||'';
  if(type==='att'){
    headers=['Student','Batch','Total Classes','Present','Absent','Attendance %'];
    students.filter(s=>!fb||s.batch===fb).forEach(s=>{
      const r=attData.filter(a=>a.sid===s.id);const tot=r.length;const pres=r.filter(a=>a.status==='P').length;
      rows.push([s.name,s.batch,tot,pres,tot-pres,tot?Math.round(pres/tot*100)+'%':'0%']);
    });
  } else if(type==='marks'){
    const fe=document.getElementById('exp-marks-exam')?.value||'';
    headers=['Student','Batch','Exam','Subject','Marks','Total','%','Grade'];
    marksData.filter(m=>(!fb||m.batch===fb)&&(!fe||m.exam===fe)).forEach(m=>{
      const pct=Math.round(m.marks/m.total*100);const{g}=getGrade(pct);
      rows.push([m.sname,m.batch,m.exam,m.subj,m.marks,m.total,pct+'%',g]);
    });
  } else if(type==='hw'){
    headers=['Student','Batch','Assignment','Subject','Due','Submitted','HW Check Status'];
    hwData.filter(h=>!fb||h.batch===fb).forEach(hw=>{
      students.filter(s=>s.batch===hw.batch).forEach(s=>{
        rows.push([s.name,s.batch,hw.title,hw.subj,hw.due,hw.completions?.[s.id]==='done'?'Yes':'No',hwStatusLabel[hw.hwStatus?.[s.id]||'pending'].replace(/[✓⊘✗—]/g,'').trim()]);
      });
    });
  } else {
    headers=['Name','Roll No.','Batch','Subject Group','Parent Phone'];
    students.filter(s=>!fb||s.batch===fb).forEach(s=>rows.push([s.name,s.roll,s.batch,s.subj,s.phone]));
  }
  const csv=[headers,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='EduCoach_'+type+'_report_'+today().replace(/\//g,'-')+'.csv';
  a.click();notif('✓ CSV downloaded');
}

function printReport(type){
  const fb=(document.getElementById('exp-'+type+'-batch')||document.getElementById('exp-att-batch'))?.value||'';
  let tableHTML='',title='';
  if(type==='att'){
    title='Attendance Report';
    tableHTML='<table><tr><th>Student</th><th>Batch</th><th>Total</th><th>Present</th><th>Absent</th><th>%</th><th>Status</th></tr>';
    students.filter(s=>!fb||s.batch===fb).forEach(s=>{
      const r=attData.filter(a=>a.sid===s.id);const tot=r.length;const pres=r.filter(a=>a.status==='P').length;
      const pct=tot?Math.round(pres/tot*100):0;
      tableHTML+=`<tr><td>${s.name}</td><td>${s.batch}</td><td>${tot}</td><td>${pres}</td><td>${tot-pres}</td><td>${pct}%</td><td>${pct>=75?'Regular':pct>=60?'At Risk':'Low'}</td></tr>`;
    });
    tableHTML+='</table>';
  } else if(type==='marks'){
    title='Marks Report';
    tableHTML='<table><tr><th>Student</th><th>Batch</th><th>Exam</th><th>Subject</th><th>Marks</th><th>%</th><th>Grade</th></tr>';
    marksData.filter(m=>(!fb||m.batch===fb)).forEach(m=>{const pct=Math.round(m.marks/m.total*100);const{g}=getGrade(pct);tableHTML+=`<tr><td>${m.sname}</td><td>${m.batch}</td><td>${m.exam}</td><td>${m.subj}</td><td>${m.marks}/${m.total}</td><td>${pct}%</td><td>${g}</td></tr>`;});
    tableHTML+='</table>';
  } else if(type==='hw'){
    title='Homework Report';
    tableHTML='<table><tr><th>Student</th><th>Batch</th><th>Assignment</th><th>Subject</th><th>Submitted</th><th>Check Status</th></tr>';
    hwData.filter(h=>!fb||h.batch===fb).forEach(hw=>students.filter(s=>s.batch===hw.batch).forEach(s=>{tableHTML+=`<tr><td>${s.name}</td><td>${s.batch}</td><td>${hw.title}</td><td>${hw.subj}</td><td>${hw.completions?.[s.id]==='done'?'Yes':'No'}</td><td>${(hwStatusLabel[hw.hwStatus?.[s.id]||'pending']||'').replace(/[✓⊘✗—]/g,'').trim()}</td></tr>`;}));
    tableHTML+='</table>';
  } else {
    title='Student List';
    tableHTML='<table><tr><th>Name</th><th>Roll</th><th>Batch</th><th>Subject Group</th><th>Phone</th></tr>';
    students.filter(s=>!fb||s.batch===fb).forEach(s=>{tableHTML+=`<tr><td>${s.name}</td><td>${s.roll}</td><td>${s.batch}</td><td>${s.subj}</td><td>${s.phone}</td></tr>`;});
    tableHTML+='</table>';
  }
  const html=`<!DOCTYPE html><html><head><title>${title} — EduCoach Pro</title>
  <style>body{font-family:Arial,sans-serif;font-size:12px;padding:20px;color:#222}
  h2{margin-bottom:4px}p{color:#666;margin-bottom:16px;font-size:11px}
  table{width:100%;border-collapse:collapse}th,td{border:1px solid #ccc;padding:7px 10px;text-align:left}
  th{background:#f4f4f4;font-weight:600}tr:nth-child(even){background:#fafafa}
  @media print{button{display:none}}</style></head>
  <body><h2>🎓 EduCoach Pro — ${title}</h2><p>Generated: ${today()}</p>
  ${tableHTML}<br><button onclick="window.print()">🖨 Print this page</button></body></html>`;
  const w=window.open('','_blank');
  if(w){w.document.write(html);w.document.close();}
  else notif('Allow popups to open print window','#f43f5e');
}
